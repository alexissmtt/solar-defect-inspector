apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspector-api
  labels:
    app: inspector-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inspector-api
  template:
    metadata:
      labels:
        app: inspector-api
    spec:
      # Run Alembic migrations before the app container starts.
      initContainers:
        - name: migrate
          image: gcr.io/PROJECT_ID/solar-inspector:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: inspector-config
            - secretRef:
                name: inspector-secrets
      containers:
        - name: api
          image: gcr.io/PROJECT_ID/solar-inspector:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: inspector-config
            - secretRef:
                name: inspector-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
