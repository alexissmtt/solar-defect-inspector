# Example only -- never commit real secrets. Apply the real values with
#   kubectl create secret generic inspector-secrets \
#     --from-literal=INSPECTOR_DATABASE_URL=... \
#     --from-literal=INSPECTOR_GROQ_API_KEY=...
apiVersion: v1
kind: Secret
metadata:
  name: inspector-secrets
type: Opaque
stringData:
  INSPECTOR_DATABASE_URL: "postgresql+psycopg://user:pass@10.0.0.3:5432/inspector"
  INSPECTOR_GROQ_API_KEY: "gsk_replace_me"
